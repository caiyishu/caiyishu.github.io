<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="520" viewBox="0 72 2048 520" role="img" aria-labelledby="title desc">
  <title id="title">Chinese firms going global: from government-oriented strategy to social embeddedness</title>
  <desc id="desc">A three-part diagram showing a government-oriented model, rising uncertainty, and a socially embedded model for Chinese firms abroad.</desc>
  <defs>
    <linearGradient id="blueTag" x1="0" x2="1">
      <stop offset="0" stop-color="#0d2f55"/>
      <stop offset="1" stop-color="#183d6a"/>
    </linearGradient>
