      <stop offset="1" stop-color="#5f7fa0"/>
    </linearGradient>
    <linearGradient id="globe" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dce8f2"/>
      <stop offset="0.55" stop-color="#a9bccd"/>
      <stop offset="1" stop-color="#8098ad"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#38516b" flood-opacity="0.14"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <marker id="arrowHeadBlue" markerWidth="16" markerHeight="12" refX="14" refY="6" orient="auto" markerUnits="userSpaceOnUse">
