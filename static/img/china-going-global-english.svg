      <stop offset="0" stop-color="#cc2d10"/>
      <stop offset="1" stop-color="#db4518"/>
    </linearGradient>
    <linearGradient id="greenTag" x1="0" x2="1">
      <stop offset="0" stop-color="#149b82"/>
      <stop offset="1" stop-color="#168d70"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" x2="1">
