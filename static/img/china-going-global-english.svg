      <stop offset="0.5" stop-color="#f2f5f8"/>
      <stop offset="1" stop-color="#f9fcfb"/>
    </linearGradient>
    <linearGradient id="arrowFade" x1="0" x2="1">
      <stop offset="0" stop-color="#d8e0e8" stop-opacity="0"/>
